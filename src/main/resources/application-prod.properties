spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

spring.jwt.secret=${JWT_SECRET}
spring.jwt.expiration=${JWT_EXPIRATION:3600000}
spring.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${UPLOAD_DIR:/app/uploads}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
webSiteUrl=${WEBSITE_URL:https://pureclean.vercel.app}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

server.port=${PORT:8080}

logging.level.root=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.com.wash=INFO 