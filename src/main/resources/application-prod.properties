spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=16

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

spring.jwt.secret=${JWT_SECRET}
spring.jwt.access-token-expiration=${JWT_EXPIRATION:3600}
spring.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${UPLOAD_DIR:/app/uploads}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
webSiteUrl=${WEBSITE_URL:https://pureclean.vercel.app}
app.frontend.url=${WEBSITE_URL:https://pureclean.vercel.app}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

server.port=${PORT:8080}

server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/html,text/css,text/plain,application/xml
server.compression.min-response-size=1024

app.use-secure-cookies=true

logging.level.root=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.com.wash=INFO
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
