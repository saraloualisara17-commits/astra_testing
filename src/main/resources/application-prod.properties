spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

spring.jwt.secret=${JWT_SECRET}
spring.jwt.access-token-expiration=${JWT_EXPIRATION:3600}
spring.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${UPLOAD_DIR:/app/uploads}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
webSiteUrl=${WEBSITE_URL:https://pureclean.vercel.app}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

server.port=${PORT:8080}

app.use-secure-cookies=true

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.wash=DEBUG
