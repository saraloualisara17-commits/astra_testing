spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=laundry-app

spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/laundry}
spring.datasource.username=${DATASOURCE_USERNAME:root}
spring.datasource.password=${DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jwt.secret=${JWT_SECRET:localdevsecretneedstobe32charslong}
spring.jwt.expiration=3600000
spring.jwt.refresh-expiration=604800000

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${UPLOAD_DIR:./uploads}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
webSiteUrl=${WEBSITE_URL:http://localhost:5173} 