spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=laundry-app

spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/laundry-app}
spring.datasource.username=${DATASOURCE_USERNAME:root}
spring.datasource.password=${DATASOURCE_PASSWORD:abdourz15@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.jwt.secret=${JWT_SECRET}
spring.jwt.access-token-expiration=3600
spring.jwt.refresh-token-expiration=604800

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${UPLOAD_DIR:./uploads}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://pureclean-backend-production.up.railway.app}

# Forces Secure+SameSite=None on the refreshToken cookie when accessed over HTTPS.
app.use-secure-cookies=true
