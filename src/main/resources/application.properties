spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=laundry-app

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/laundry-app?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars}
spring.jwt.access-token-expiration=${JWT_EXPIRATION:3600}
spring.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=${UPLOAD_DIR:./uploads}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
webSiteUrl=${WEBSITE_URL:http://localhost:5173}

app.use-secure-cookies=false
app.audit.retention-days=365

# Operational alert thresholds
alerts.overdue-pickup-hours=24
alerts.delayed-delivery-hours=48
alerts.unpaid-debt-days=7
alerts.scan-interval-ms=1800000
