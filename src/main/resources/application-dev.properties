# ─── DEV PROFILE OVERRIDES ────────────────────────────────────────────────────
# These settings are intentionally unsafe for production.
# They are only active when SPRING_PROFILES_ACTIVE=dev (the default).

spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/laundry-app}
spring.datasource.username=${DATASOURCE_USERNAME:root}
spring.datasource.password=${DATASOURCE_PASSWORD:abdourz15@}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Flyway disabled in dev — ddl-auto=update handles schema changes.
spring.flyway.enabled=false

logging.level.com.wash=DEBUG
logging.level.org.springframework.web=DEBUG

# Dev runs over HTTP, so cookies must not require Secure (would be silently dropped otherwise)
app.use-secure-cookies=false
